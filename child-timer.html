<!DOCTYPE html>
<html class="h-full select-none text-[15px]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>今日時間管理工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sibylBg: '#F9F6F0',      
            sibylText: '#4A3E3D',    
            sibylMuted: '#8A7A78',   
            sibylMain: '#E8D8CE',    
            sibylSuccess: '#D4E2D4', 
            sibylSuccessText: '#3A4D39',
            sibylLight: '#bca085'    
          },
          borderRadius: { '3xl': '30px' }
        }
      }
    }
  </script>
  <style>
    /* 螢幕震撼全畫面爆閃效果 */
    .bombing-mode { animation: flashBomb 0.15s infinite alternate !important; }
    @keyframes flashBomb { 0% { background-color: #FFC4C4 !important; } 100% { background-color: #FFFFFF !important; } }
    .bombing-body { animation: bodyBomb 0.15s infinite alternate !important; }
    @keyframes bodyBomb { 0% { background-color: #FFA3A3 !important; } 100% { background-color: #F9F6F0 !important; } }
  </style>
</head>
<body id="mainBody" class="bg-sibylBg m-0 p-4 min-h-full flex flex-col items-center justify-start box-border text-sibylText">

  <!-- 🔊 質感啟動與防呆連線遮罩層 -->
  <div id="audioUnlockOverlay" class="fixed inset-0 bg-sibylBg z-[9999] flex flex-col items-center justify-center p-4 box-border transition-all duration-500">
    <div class="w-full max-w-[360px] bg-white rounded-[32px] p-6 text-center shadow-[0_20px_50px_rgba(74,62,61,0.05)] border border-[#EFEAE2] flex flex-col items-center box-border">
      
      <div class="w-16 h-16 bg-sibylMain/30 rounded-full flex items-center justify-center mb-4 animate-pulse">
        <div class="w-12 h-12 bg-sibylMain rounded-full flex items-center justify-center shadow-inner">
          <span class="text-xl">✨</span>
        </div>
      </div>
      
      <h2 class="m-0 mb-2 text-lg font-bold tracking-tight text-sibylText">數位管家已就緒</h2>
      <p class="text-xs text-sibylMuted mb-5 px-2 leading-relaxed" id="txtOverlayTips">
        正在確認雲端資料庫連線權限...
      </p>

      <!-- 綁定輸入框 -->
      <div id="idSetupBox" class="w-full mb-5 hidden">
        <input type="text" class="w-full p-3.5 rounded-xl border border-[#EFEAE2] bg-[#FDFBF7] text-xs text-center outline-none text-sibylText" id="inputSpreadsheetUrl" placeholder="請貼上您的 Google 試算表完整網址">
        <button class="w-full mt-2 py-2.5 bg-sibylText text-white text-xs font-semibold rounded-xl cursor-pointer" onclick="saveManualUrl()">綁定此資料庫 🔗</button>
      </div>
      
      <button class="w-full py-3.5 bg-[#EFEAE2] text-sibylMuted border-none rounded-2xl text-sm font-bold tracking-wider transition-all duration-300" id="btnUnlockStart" onclick="unlockAudioAndLoad()" disabled>
        正在驗證安全通道...
      </button>
      
      <div class="text-[9px] text-sibylLight/70 tracking-widest uppercase mt-5">
        Sibyl Digital Security Connected
      </div>
    </div>
  </div>

  <!-- 自製提示條 (Toast) -->
  <div id="sibylToast" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100000] w-[90%] max-w-[340px] bg-white text-sibylText p-4 rounded-2xl text-xs font-medium shadow-[0_10px_30px_rgba(74,62,61,0.1)] border border-[#FFD2D2] flex items-center gap-3 transition-all duration-300 translate-y-[-100px] opacity-0">
    <span class="text-base" id="toastIcon">⚠️</span>
    <span id="toastMsg" class="flex-1">提示訊息</span>
  </div>

  <!-- 🧒 孩子操作台視圖 -->
  <div class="w-full max-w-[440px] bg-white rounded-3xl p-5 md:p-6 shadow-[0_12px_40px_rgba(74,62,61,0.01)] box-border mb-4 relative border border-[#EFEAE2]/20" id="childView" style="display: none;">
    <div class="absolute top-5 right-5 text-xs text-sibylMuted font-medium cursor-pointer" onclick="switchView('login')">⚙️ 家長管理</div>
    <h1 class="text-xl font-bold text-center m-0 mb-1" id="txtGreeting">連線中...</h1>
    <div class="text-[11px] text-sibylMuted text-center mb-4">今天也要保持好習慣唷 ✨</div>
    
    <hr class="border-0 border-t border-dashed border-[#EFEAE2] my-4">
    
    <div class="text-sm font-semibold mb-3 flex items-center gap-1.5">📋 今日必須完成</div>
    <div class="flex flex-col gap-2.5 mb-5" id="taskListContainer">
      <div class="text-center text-sibylMuted text-xs py-4">資料庫通訊中...</div>
    </div>
    
    <div class="text-sm font-semibold mb-3 flex items-center gap-1.5" id="timerTitle">⏰ 計時提醒管理</div>
    <div class="bg-[#FDFBF7] p-4 md:p-5 rounded-3xl border border-[#EFEAE2] text-center mb-5 transition-all" id="timerBox">
      <div class="text-xs text-sibylMuted mb-1" id="currentTimerItemName">請選擇下方項目開始計時</div>
      <div class="text-4xl md:text-5xl font-bold tracking-wider mb-3 font-mono text-sibylText" id="txtCountdown">00:00</div>
      <div class="grid grid-cols-2 gap-2 mt-2" id="timerBtnGridContainer"></div>
    </div>
    
    <div class="text-sm font-semibold mb-2 flex items-center gap-1.5">🔍 需要查資料嗎？</div>
    <div class="flex gap-2 mb-5">
      <input type="text" class="flex-1 p-3 rounded-xl border border-[#EFEAE2] bg-[#FDFBF7] text-xs text-sibylText outline-none" id="searchIn" placeholder="在這裡輸入想查的事物...">
      <button class="w-auto px-4 bg-sibylMain font-bold rounded-xl text-xs border-none cursor-pointer" onclick="goGoogleSearch()">搜尋</button>
    </div>
    
    <hr class="border-0 border-t border-dashed border-[#EFEAE2] my-4">
    
    <div class="text-sm font-semibold mb-2 flex items-center gap-1.5">🥰 今天的心情收件夾</div>
    <div class="flex justify-between gap-1.5 mt-2">
      <button class="flex-1 text-xl p-2 bg-[#FDFBF7] border border-[#EFEAE2] rounded-xl cursor-pointer transition-all active:scale-95 mood-btn" id="emoji-🥰" onclick="selectMood(this, '🥰')">🥰</button>
      <button class="flex-1 text-xl p-2 bg-[#FDFBF7] border border-[#EFEAE2] rounded-xl cursor-pointer transition-all active:scale-95 mood-btn" id="emoji-🤩" onclick="selectMood(this, '🤩')">🤩</button>
      <button class="flex-1 text-xl p-2 bg-[#FDFBF7] border border-[#EFEAE2] rounded-xl cursor-pointer transition-all active:scale-95 mood-btn" id="emoji-🥱" onclick="selectMood(this, '🥱')">🥱</button>
      <button class="flex-1 text-xl p-2 bg-[#FDFBF7] border border-[#EFEAE2] rounded-xl cursor-pointer transition-all active:scale-95 mood-btn" id="emoji-🥺" onclick="selectMood(this, '🥺')">🥺</button>
    </div>
    <textarea class="w-full h-16 p-3 rounded-xl border border-[#EFEAE2] bg-[#FDFBF7] text-xs text-sibylText outline-none resize-none box-border mt-2" id="moodNote" placeholder="今天過得怎麼樣？想跟爸爸媽媽分享什麼呢...？"></textarea>
    <button class="w-full mt-2.5 p-3.5 bg-sibylSuccess text-sibylSuccessText font-bold rounded-xl text-sm shadow-[0_4px_15px_rgba(212,226,212,0.4)] border-none cursor-pointer" onclick="sendMoodText()">寫好了！送給爸媽 🎉</button>
  </div>

  <!-- 🔒 家長驗證視圖 -->
  <div class="w-full max-w-[440px] bg-white rounded-3xl p-6 shadow-[0_12px_40px_rgba(74,62,61,0.02)] box-border mb-4 border border-[#EFEAE2]/20" id="loginView" style="display: none;">
    <h1 class="text-base font-bold mb-4">🔐 進入家長管理後台</h1>
    <div class="mb-3">
      <label class="block text-xs font-semibold mb-1 text-[#6E5E5C]">請輸入家長管理密碼</label>
      <input type="password" class="w-full p-3 rounded-xl border border-[#EFEAE2] bg-[#FDFBF7] text-xs outline-none" id="parentPasswordInput" placeholder="請輸入密碼">
    </div>
    <div class="flex gap-2 mt-5">
      <button class="w-full p-3 bg-[#EFEAE2] rounded-xl text-xs font-semibold border-none cursor-pointer" onclick="switchView('child')">返回</button>
      <button class="w-full p-3 bg-sibylMain rounded-xl text-xs font-bold border-none cursor-pointer" onclick="verifyParentPassword()">驗證登入</button>
    </div>
  </div>

  <!-- 👩‍🦰 家長設置與監控視圖 -->
  <div class="w-full max-w-[440px] bg-white rounded-3xl p-5 md:p-6 shadow-[0_12px_40px_rgba(74,62,61,0.02)] box-border mb-4 border border-[#EFEAE2]/20" id="parentView" style="display: none;">
    <h1 class="text-base font-bold mb-1">⚙️ 控制面板與進度監控</h1>
    <div class="text-[11px] text-sibylMuted mb-4">同步資料中，變更後孩子端同步更新</div>
    
    <div class="bg-[#FDFBF7] p-3.5 rounded-xl border border-[#EFEAE2] mb-5 text-xs">
      <div class="font-semibold mb-1.5 text-sibylSuccessText">📈 今日即時狀態：</div>
      <div class="mb-1">• 任務完成度：<span id="monProgress" class="font-bold">0%</span></div>
      <div class="mb-1">• 計時器狀態：<span id="monTimerState" class="font-bold">閒置</span> (<span id="monTimerLeft">--</span>)</div>
      <div class="mt-1.5 pt-1.5 border-t border-dashed border-[#EFEAE2]">
        • 心情狀態：<span id="monMood" class="font-bold">無</span> <span id="monMoodNote" class="text-sibylMuted ml-1"></span>
      </div>
    </div>

    <div class="space-y-3 text-xs">
      <div><label class="block font-semibold mb-1 text-[#6E5E5C]">家長管理密碼</label><input type="text" class="w-full p-3 rounded-xl border border-[#EFEAE2] bg-[#FDFBF7]" id="cfgPassword"></div>
      <div><label class="block font-semibold mb-1 text-[#6E5E5C]">孩子暱稱</label><input type="text" class="w-full p-3 rounded-xl border border-[#EFEAE2] bg-[#FDFBF7]" id="cfgNickname"></div>
      <div><label class="block font-semibold mb-1 text-[#6E5E5C]">每日任務清單 (請以英文逗號隔開)</label><input type="text" class="w-full p-3 rounded-xl border border-[#EFEAE2] bg-[#FDFBF7]" id="cfgTasks"></div>
      <div><label class="block font-semibold mb-1 text-[#6E5E5C]">計時項目名稱 (多個請以英文逗號隔開)</label><input type="text" class="w-full p-3 rounded-xl border border-[#EFEAE2] bg-[#FDFBF7]" id="cfgTimerName"></div>
      <div><label class="block font-semibold mb-1 text-[#6E5E5C]">計時長度_分鐘 (對應多個項目請以逗號隔開)</label><input type="text" class="w-full p-3 rounded-xl border border-[#EFEAE2] bg-[#FDFBF7]" id="cfgTimerMin"></div>
      <div><label class="block font-semibold mb-1 text-[#6E5E5C]">計時結束播報語</label><input type="text" class="w-full p-3 rounded-xl border border-[#EFEAE2] bg-[#FDFBF7]" id="cfgAlertText" placeholder="不填則預設說：時間到了！"></div>
      <div><label class="block font-semibold mb-1 text-[#6E5E5C]">定時提醒時間 (例如 21:00)</label><input type="text" class="w-full p-3 rounded-xl border border-[#EFEAE2] bg-[#FDFBF7]" id="cfgFixedTime"></div>
      <div><label class="block font-semibold mb-1 text-[#6E5E5C]">定時提醒語</label><input type="text" class="w-full p-3 rounded-xl border border-[#EFEAE2] bg-[#FDFBF7]" id="cfgFixedText"></div>
    </div>
    
    <div class="flex gap-2 mt-5">
      <button class="w-full p-3.5 bg-[#EFEAE2] rounded-xl text-xs font-semibold border-none cursor-pointer" onclick="switchView('child')">登出後台</button>
      <button class="w-full p-3.5 bg-sibylMain rounded-xl text-xs font-bold border-none cursor-pointer" id="btnSaveConfig" onclick="saveConfigToServer()">儲存並同步 💾</button>
    </div>
  </div>

  <div class="text-center mt-5 mb-3 text-sibylLight text-[10px] tracking-widest uppercase">
    Designed by <a href="https://www.heysibyl.com/" target="_blank" class="font-bold hover:underline">Sibyl | 數位管家</a>
  </div>

  <script>
    const GAS_API_URL = "請貼上妳的GAS網頁應用程式部署網址";

    let SPREADSHEET_ID = "";
    let globalConfig = {};
    let globalStatus = {};
    let selectedEmoji = "";
    let countdownInterval = null;
    let refreshInterval = null;
    let isFixedAlertTriggered = false; 
    let isSyncing = false; // 關鍵鎖：避免非同步請求打架將狀態刷掉

    const colorPalette = [
      { bg: 'bg-[#F4EAE6]', border: 'border-[#E5D4CD]', text: 'text-[#AA6C59]' }, 
      { bg: 'bg-[#E4ECF4]', border: 'border-[#CEDCEB]', text: 'text-[#597B9A]' }, 
      { bg: 'bg-[#EBF3ED]', border: 'border-[#D6E6DC]', text: 'text-[#5E8B6E]' }, 
      { bg: 'bg-[#F8F1E5]', border: 'border-[#ECDCC4]', text: 'text-[#A08153]' }, 
      { bg: 'bg-[#F0ECF4]', border: 'border-[#E2DAEB]', text: 'text-[#7C5A99]' }
    ];

    function showSibylToast(message, type = "error") {
      const toast = document.getElementById('sibylToast');
      const msgSpan = document.getElementById('toastMsg');
      const iconSpan = document.getElementById('toastIcon');
      msgSpan.innerText = message;
      if (type === "success") {
        iconSpan.innerText = "✨"; toast.style.borderColor = "#C2D3C2"; toast.style.backgroundColor = "#F3F8F3";
      } else {
        iconSpan.innerText = "❌"; toast.style.borderColor = "#FFD2D2"; toast.style.backgroundColor = "#FFF5F5";
      }
      toast.classList.remove('opacity-0');
      toast.classList.add('opacity-100', 'translate-y-6');
      setTimeout(() => {
        toast.classList.remove('opacity-100', 'translate-y-6');
        toast.classList.add('opacity-0');
      }, 4000);
    }

    function formatTimeStr(rawStr) {
      if (!rawStr) return "";
      let s = String(rawStr).trim();
      if (s.includes("T") && s.includes("Z")) {
        try {
          let tPart = s.split("T")[1].substring(0, 5); 
          let parts = tPart.split(":");
          let hh = (parseInt(parts[0]) + 8) % 24; 
          return `${hh.toString().padStart(2, '0')}:${parts[1]}`;
        } catch(e) { return s; }
      }
      return s;
    }

    function checkLocalStorageAndUrl() {
      let localSavedId = localStorage.getItem('sibyl_saved_id');
      if (localSavedId && localSavedId.trim() !== "") {
        SPREADSHEET_ID = localSavedId;
        enableStartButton();
        return;
      }
      let urlParams = new URLSearchParams(window.location.search);
      SPREADSHEET_ID = urlParams.get('id');
      if (SPREADSHEET_ID && SPREADSHEET_ID.trim() !== "") {
        localStorage.setItem('sibyl_saved_id', SPREADSHEET_ID);
        enableStartButton();
      } else {
        showManualInputBox();
      }
    }

    function showManualInputBox() {
      document.getElementById('txtOverlayTips').innerHTML = "👋 初次使用設定：<br><span class='text-xs text-sibylMuted font-normal'>請在下方貼上您開通的那張「Google 試算表完整網址」，綁定一次後手機就會永久記住囉！</span>";
      document.getElementById('idSetupBox').classList.remove('hidden');
    }

    function saveManualUrl() {
      let rawUrl = document.getElementById('inputSpreadsheetUrl').value.trim();
      if (!rawUrl) { showSibylToast("請輸入網址"); return; }
      let matches = rawUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
      if (matches && matches[1]) {
        SPREADSHEET_ID = matches[1];
        localStorage.setItem('sibyl_saved_id', SPREADSHEET_ID);
        showSibylToast("資料庫鎖定成功！✨", "success");
        enableStartButton();
      } else {
        showManualInputBox();
        showSibylToast("網址格式不正確，請貼上完整試算表網址。");
      }
    }

    function enableStartButton() {
      document.getElementById('idSetupBox').classList.add('hidden');
      const btn = document.getElementById('btnUnlockStart');
      btn.disabled = false;
      btn.innerText = "開啟今日任務與同步 🎉";
      btn.className = "w-full py-4 bg-sibylMain text-sibylText border-none rounded-2xl text-base font-bold tracking-wider shadow-[0_6px_20px_rgba(232,216,206,0.4)] hover:opacity-95 active:scale-[0.98] transition-all cursor-pointer";
      document.getElementById('txtOverlayTips').innerText = "安全網路連線已建立，點擊下方即可開始使用。";
    }

    checkLocalStorageAndUrl();

    function unlockAudioAndLoad() {
      if (!SPREADSHEET_ID) { showSibylToast("尚未取得雲端資料庫 ID"); return; }
      
      // 請求推播權限（穿透手機休眠、鎖屏的唯一硬實力）
      if ('Notification' in window) {
        Notification.requestPermission().then(permission => {
          if (permission === 'granted') console.log('通知權限已開通');
        });
      }

      if ('speechSynthesis' in window) {
        let u = new SpeechSynthesisUtterance('');
        window.speechSynthesis.speak(u);
      }
      
      const overlay = document.getElementById('audioUnlockOverlay');
      overlay.classList.add('opacity-0', 'pointer-events-none');
      setTimeout(() => { overlay.style.display = 'none'; }, 500);
      
      document.getElementById('childView').style.display = 'block';
      fetchDataFromServer();
      // 固定定時自動刷新
      refreshInterval = setInterval(fetchDataFromServer, 15000); 
    }

    function call母艦API(dataObject, successCallback) {
      dataObject.spreadsheetId = SPREADSHEET_ID;
      fetch(GAS_API_URL, {
        method: "POST",
        mode: "cors",
        body: JSON.stringify(dataObject)
      })
      .then(res => res.json())
      .then(res => {
        if(res.success) {
          if(successCallback) successCallback(res);
        } else {
          showSibylToast("母艦回傳錯誤: " + res.message);
        }
      })
      .catch(err => {
        showSibylToast("同步失敗，請確認 GAS 部署網址是否正確。");
      });
    }

    function fetchDataFromServer() {
      // 正在與用戶端上傳互動時，暫停定時刷新的覆蓋，保護打勾不消失
      if (isSyncing) return; 

      call母艦API({ action: "loadAll" }, function(res) {
        globalConfig = res.settings;
        globalStatus = res.status;
        renderPageElements();
      });
    }

    function renderPageElements() {
      document.getElementById('txtGreeting').innerText = `哈囉，${globalConfig['孩子暱稱'] || '寶貝'}`;
      
      const container = document.getElementById('taskListContainer');
      container.innerHTML = "";
      const taskRaw = globalConfig['每日任務清單'] || "";
      const taskArray = taskRaw.split(',').map(t => t.trim()).filter(t => t.length > 0);
      
      const statusMap = {};
      if (globalStatus['目前勾選狀態']) {
        globalStatus['目前勾選狀態'].split(',').forEach(item => {
          const parts = item.split(':');
          if(parts.length === 2) statusMap[parts[0].trim()] = parts[1].trim();
        });
      }

      if(taskArray.length === 0) {
        container.innerHTML = `<div class="text-center text-sibylMuted text-xs py-4">後台尚未配置今日任務唷。</div>`;
      }

      taskArray.forEach(task => {
        const isDone = statusMap[task] === "已完成";
        const div = document.createElement('div');
        div.className = `flex items-center p-3.5 rounded-2xl cursor-pointer transition-all border ${isDone ? 'bg-sibylSuccess border-[#C2D3C2] text-sibylSuccessText' : 'bg-[#FDFBF7] border-[#EFEAE2]'}`;
        const chkClass = isDone ? 'border-sibylSuccessText bg-sibylSuccessText text-white' : 'border-[#D1C7BD] bg-white';
        const chkInner = isDone ? '✓' : '';
        
        div.innerHTML = `<div class="w-5 h-5 border-2 rounded-md mr-3 flex items-center justify-center font-bold text-xs flex-shrink-0 ${chkClass}">${chkInner}</div><span class="font-medium text-xs">［${task}］${isDone ? '已經完成囉！' : '尚未完成'}</span>`;
        div.onclick = function() { toggleTaskStatus(task, isDone, taskArray); };
        container.appendChild(div);
      });

      if (!countdownInterval) {
        const btnContainer = document.getElementById('timerBtnGridContainer');
        btnContainer.innerHTML = "";
        const names = (globalConfig['計時項目名稱'] || "").split(',').map(n => n.trim()).filter(n => n.length > 0);
        const mins = (globalConfig['計時長度_分鐘'] || "").split(',').map(m => m.trim()).filter(m => m.length > 0);
        
        names.forEach((name, idx) => {
          const mLen = mins[idx] || "40";
          const btn = document.createElement('button');
          const styleSet = colorPalette[idx % colorPalette.length];
          btn.className = `p-3 border ${styleSet.border} ${styleSet.bg} ${styleSet.text} rounded-xl font-bold text-xs cursor-pointer active:scale-95 transition-all btn-timer-item flex flex-col items-center justify-center gap-0.5`;
          btn.innerHTML = `<span class="opacity-80">${name}</span><span class="text-[10px] font-normal font-mono opacity-90">倒數 ${mLen} 分鐘</span>`;
          btn.onclick = function() { startTimerSession(name, parseInt(mLen)); };
          btnContainer.appendChild(btn);
        });
      }

      // 同步刷新家長監控控制面板數值
      document.getElementById('monProgress').innerText = globalStatus['今日任務達成率'] || '0%';
      document.getElementById('monTimerState').innerText = globalStatus['計時狀態'] || '閒置';
      document.getElementById('monTimerLeft').innerText = globalStatus['計時剩餘時間'] || '--';
      document.getElementById('monMood').innerText = globalStatus['今日心情 Emoji'] || '未填';
      document.getElementById('monMoodNote').innerText = globalStatus['今日心情留言'] || '';
      
      // 更新心情 Emoji 高亮按鈕選取固定
      document.querySelectorAll('.mood-btn').forEach(b => b.className = b.className.replace(' bg-sibylMain border-sibylLight font-bold', ''));
      if(globalStatus['今日心情 Emoji']) {
        const activeBtn = document.getElementById(`emoji-${globalStatus['今日心情 Emoji']}`);
        if(activeBtn) activeBtn.className += ' bg-sibylMain border-sibylLight font-bold';
      }

      if (document.getElementById('parentView').style.display === 'block') {
        document.getElementById('cfgFixedTime').value = formatTimeStr(globalConfig['定時提醒時間']);
      }
      
      checkFixedTimeAlert();
    }

    // 樂觀更新控制：按下立即鎖定畫面渲染，保證當天固定不跳掉
    function toggleTaskStatus(targetTask, currentDone, allTasks) {
      isSyncing = true; // 開啟通訊鎖
      const statusMap = {};
      allTasks.forEach(t => { statusMap[t] = "未完成"; });
      if (globalStatus['currentlyStatus'] || globalStatus['currentlyStatus'] !== undefined || globalStatus['目前勾選狀態']) {
        (globalStatus['目前勾選狀態'] || "").split(',').forEach(item => {
          const parts = item.split(':');
          if(parts.length === 2) statusMap[parts[0].trim()] = parts[1].trim();
        });
      }
      
      statusMap[targetTask] = currentDone ? "未完成" : "Macro已完成"; // 狀態翻轉
      statusMap[targetTask] = statusMap[targetTask] === "Macro已完成" ? "已完成" : "未完成";

      let doneCount = 0;
      let statusStringArray = [];
      allTasks.forEach(t => {
        if(statusMap[t] === "已完成") doneCount++;
        statusStringArray.push(`${t}:${statusMap[t]}`);
      });
      const progressPercent = Math.round((doneCount / allTasks.length) * 100);
      const taskString = statusStringArray.join(', ');

      // 畫面立即渲染（樂觀固定）
      globalStatus['目前勾選狀態'] = taskString;
      globalStatus['今日任務達成率'] = progressPercent + "%";
      renderPageElements();

      // 上傳給母艦並更新 TodayStatus
      call母艦API({ 
        action: "updateTask", 
        taskString: taskString, 
        progressPercent: progressPercent + "%" 
      }, function() {
        isSyncing = false; // 解除通訊鎖，完成對齊
      });
    }

    // 心情 Emoji 按鈕點選：立即鎖定寫入 TodayStatus 
    function selectMood(element, emoji) {
      isSyncing = true;
      document.querySelectorAll('.mood-btn').forEach(b => b.className = b.className.replace(' bg-sibylMain border-sibylLight font-bold', ''));
      element.className += ' bg-sibylMain border-sibylLight font-bold';
      selectedEmoji = emoji;
      
      globalStatus['今日心情 Emoji'] = emoji;
      
      call母艦API({ 
        action: "submitMood", 
        emoji: selectedEmoji, 
        message: document.getElementById('moodNote').value 
      }, function() {
        isSyncing = false;
        showSibylToast("今日心情符號已同步！✨", "success");
      });
    }

    // 心情文字留言區：需點擊按鈕才送出
    function sendMoodText() {
      const note = document.getElementById('moodNote').value;
      if (!selectedEmoji) { showSibylToast("請先挑選上方一個心情小幫手 Emoji 唷！"); return; }
      isSyncing = true;
      call母艦API({ action: "submitMood", emoji: selectedEmoji, message: note }, function() {
        isSyncing = false;
        showSibylToast("心情日記已成功送達家長控制台！🥰", "success");
        document.getElementById('moodNote').value = "";
        fetchDataFromServer();
      });
    }

    function startTimerSession(name, minutes) {
      if (countdownInterval) clearInterval(countdownInterval);
      document.getElementById('currentTimerItemName').innerText = `正在計時項目：［${name}］`;
      let totalSeconds = minutes * 60;
      
      document.querySelectorAll('.btn-timer-item').forEach(b => b.disabled = true);
      call母艦API({ action: "updateTimer", timerState: `運作［${name}］`, remainingTime: `${minutes}分0秒` });

      countdownInterval = setInterval(function() {
        totalSeconds--;
        let m = Math.floor(totalSeconds / 60);
        let s = totalSeconds % 60;
        document.getElementById('txtCountdown').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

        if (totalSeconds % 15 === 0) {
          call母艦API({ action: "updateTimer", timerState: `運作［${name}］`, remainingTime: `${m}分${s}秒` });
        }

        if (totalSeconds <= 0) {
          clearInterval(countdownInterval);
          countdownInterval = null;
          document.querySelectorAll('.btn-timer-item').forEach(b => b.disabled = false);
          document.getElementById('txtCountdown').innerText = "00:00";
          document.getElementById('currentTimerItemName').innerText = "計時完成！";
          
          // 修正：手動計時器歸零播報文字內容：『時間到了！』說四次
          let speakTxt = globalConfig['計時結束播報語'] ? globalConfig['計時結束播報語'].trim() : "";
          if(!speakTxt) {
            speakTxt = "時間到了！時間到了！時間到了！時間到了！";
          }
          triggerVisualAndAudioBombing("⏰ 計時任務終了", speakTxt);
        }
      }, 1000);
    }

    // 雙重計時炸彈：支援鎖屏點亮穿透 + 爆閃 + 震動 + 四遍廣播
    function triggerVisualAndAudioBombing(title, speakText) {
      // 1. 穿透休眠與螢幕鎖屏：發送系統級通知點亮螢幕、引導震動
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(title, {
          body: speakText,
          icon: 'https://cdn-icons-png.flaticon.com/512/3652/3652191.png',
          vibrate: [300, 100, 300, 100, 300, 100, 300] // 引導手機原生硬體震動
        });
      }

      // 2. 觸發網頁前台硬體 Vibrate 震動
      if ('vibrate' in navigator) {
        navigator.vibrate([400, 200, 400, 200, 400, 200, 400]); 
      }
      
      // 3. 螢幕全畫面連環爆閃
      const box = document.getElementById('timerBox');
      const body = document.getElementById('mainBody');
      box.classList.add('bombing-mode');
      body.classList.add('bombing-body');

      // 4. 真人中文語音合成廣播
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel(); 
        let u = new SpeechSynthesisUtterance(speakText);
        u.lang = 'zh-TW'; 
        u.rate = 0.9; 
        u.volume = 1.0;
        window.speechSynthesis.speak(u);
      }

      call母艦API({ action: "updateTimer", timerState: "強制提醒發動中", remainingTime: "0分0秒" });
      
      setTimeout(function() {
        box.classList.remove('bombing-mode');
        body.classList.remove('bombing-body');
        call母艦API({ action: "updateTimer", timerState: "閒置", remainingTime: "" });
        isFixedAlertTriggered = false;
      }, 30000);
    }

    function checkFixedTimeAlert() {
      if(!globalConfig['定時提醒時間']) return;
      const cleanTargetTime = formatTimeStr(globalConfig['定時提醒時間']); 
      
      const now = new Date();
      const currentHHMM = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
      
      if (currentHHMM === cleanTargetTime && !isFixedAlertTriggered) {
        isFixedAlertTriggered = true;
        
        call母艦API({ action: "updateTimer", timerState: "定時提醒發動", remainingTime: "通知中" });
        document.getElementById('currentTimerItemName').innerText = "⚠️ 家長排定強制提醒 ⚠️";
        
        // 修正：定時提醒時間：播報家長管理設定的提醒語說四次
        let userFixedText = globalConfig['定時提醒語'] ? String(globalConfig['定時提醒語']).trim() : "時間到囉！";
        let loopText = `${userFixedText}，${userFixedText}，${userFixedText}，${userFixedText}`;
        
        triggerVisualAndAudioBombing("🔔 家長定時提醒時間到", loopText);
      }
    }

    function switchView(viewName) {
      document.getElementById('childView').style.display = 'none';
      document.getElementById('loginView').style.display = 'none';
      document.getElementById('parentView').style.display = 'none';
      if (viewName === 'child') document.getElementById('childView').style.display = 'block';
      if (viewName === 'login') document.getElementById('loginView').style.display = 'block';
      if (viewName === 'parent') {
        document.getElementById('parentView').style.display = 'block';
        document.getElementById('cfgPassword').value = globalConfig['家長管理密碼'] || "";
        document.getElementById('cfgNickname').value = globalConfig['孩子暱稱'] || "";
        document.getElementById('cfgTasks').value = globalConfig['每日任務清單'] || "";
        document.getElementById('cfgTimerName').value = globalConfig['計時項目名稱'] || "";
        document.getElementById('cfgTimerMin').value = globalConfig['計時長度_分鐘'] || "";
        document.getElementById('cfgAlertText').value = globalConfig['計時結束播報語'] || "";
        document.getElementById('cfgFixedTime').value = formatTimeStr(globalConfig['定時提醒時間']);
        document.getElementById('cfgFixedText').value = globalConfig['定時提醒語'] || "";
      }
    }

    function verifyParentPassword() {
      const input = document.getElementById('parentPasswordInput').value;
      if (String(input).trim() === String(globalConfig['家長管理密碼']).trim()) {
        document.getElementById('parentPasswordInput').value = "";
        switchView('parent');
      } else {
        showSibylToast("管理密碼比對核對錯誤！");
      }
    }

    function saveConfigToServer() {
      document.getElementById('btnSaveConfig').disabled = true;
      call母艦API({
        action: "saveSettings",
        password: document.getElementById('cfgPassword').value,
        nickname: document.getElementById('cfgNickname').value,
        tasks: document.getElementById('cfgTasks').value,
        timerName: document.getElementById('cfgTimerName').value,
        timerMin: document.getElementById('cfgTimerMin').value,
        alertText: document.getElementById('cfgAlertText').value,
        fixedTime: document.getElementById('cfgFixedTime').value,
        fixedText: document.getElementById('cfgFixedText').value
      }, function() {
        document.getElementById('btnSaveConfig').disabled = false;
        showSibylToast("後台設定儲存成功！大腦同步完成。", "success");
        fetchDataFromServer();
        switchView('child');
      });
    }

    function goGoogleSearch() {
      var q = document.getElementById('searchIn').value;
      if(q) { window.open('https://www.google.com/search?q=' + encodeURIComponent(q), '_blank'); }
    }
  </script>
</body>
